name: Deploy Lambda

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1  # update if you are in a different region
  AWS_LAMBDA_ROLE_ARN: arn:aws:iam::154290454507:role/lambda-image-processing-role  # replace with your ARN

jobs:
 
  # ── Job 1: metadata-extractor ────────────────────────────────────────────────
  deploy-metadata-extractor:
    name: Deploy metadata-extractor
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Build, tag, and push metadata-extractor image to Amazon ECR
        id: build-metadata-extractor
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: metadata-extractor
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd lambda/metadata_extractor
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
 
      - name: Deploy metadata-extractor Lambda
        env:
          IMAGE_URI: ${{ steps.build-metadata-extractor.outputs.image }}
        run: |
          # create the function if it doesn't exist, otherwise update it
          if aws lambda get-function --function-name metadata-extractor --region $AWS_REGION 2>/dev/null; then
            echo "updating existing metadata-extractor function..."
            aws lambda update-function-code \
              --function-name metadata-extractor \
              --image-uri $IMAGE_URI \
              --region $AWS_REGION
          else
            echo "creating metadata-extractor function..."
            aws lambda create-function \
              --function-name metadata-extractor \
              --package-type Image \
              --code ImageUri=$IMAGE_URI \
              --role $AWS_LAMBDA_ROLE_ARN \
              --timeout 30 \
              --memory-size 128 \
              --region $AWS_REGION
          fi
 
  # ── Job 2: image-validator ───────────────────────────────────────────────────
  deploy-image-validator:
    name: Deploy image-validator
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Build, tag, and push image-validator image to Amazon ECR
        id: build-image-validator
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: image-validator
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd lambda/image_validator
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
 
      - name: Deploy image-validator Lambda
        env:
          IMAGE_URI: ${{ steps.build-image-validator.outputs.image }}
        run: |
          # create the function if it doesn't exist, otherwise update it
          if aws lambda get-function --function-name image-validator --region $AWS_REGION 2>/dev/null; then
            echo "updating existing image-validator function..."
            aws lambda update-function-code \
              --function-name image-validator \
              --image-uri $IMAGE_URI \
              --region $AWS_REGION
          else
            echo "creating image-validator function..."
            aws lambda create-function \
              --function-name image-validator \
              --package-type Image \
              --code ImageUri=$IMAGE_URI \
              --role $AWS_LAMBDA_ROLE_ARN \
              --timeout 30 \
              --memory-size 128 \
              --region $AWS_REGION
          fi
 